services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mariadb:
    image: mariadb:10
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadata:/var/lib/mysql
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=postgres;Username=postgres;Password=${DB_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
  mariadata: